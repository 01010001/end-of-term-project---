services:
  kernel-dev:
    build:
      context: .
      args:
        KERNEL_VERSION: "6.8.5-301.fc40.x86_64"
    image: kernel-dev:fc40
    volumes:
      - ../tests:/workspace/tests
      - ../kernel-module:/workspace/kernel-module
      - ../cli:/workspace/cli
      - ../daemon:/workspace/daemon
      - ../gui:/workspace/gui
      - ./qemu-test.sh:/workspace/qemu-test.sh
      - ./build-alpine.sh:/workspace/build-alpine.sh
      - ./qemu-setup.sh:/workspace/qemu-setup.sh
    ports:
      - "6080:6080"
    devices:
      - /dev/kvm:/dev/kvm
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - KERNEL_VERSION=6.8.5-301.fc40.x86_64