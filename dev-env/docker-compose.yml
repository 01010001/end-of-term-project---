services:
  kernel-dev:
    build:
      context: .
      args:
        KERNEL_VERSION: "6.8.5-301.fc40.x86_64"
    image: kernel-dev:fc40
    volumes:
      - ./src:/workspace/src
      - ./test:/workspace/test
      - ./src2-simplefs:/workspace/src2-simplefs
      - ./src-vcfs:/workspace/src-vcfs
      - ./vcfs-cli:/workspace/vcfs-cli
      - ./vcfs-daemon:/workspace/vcfs-daemon
      - ./vcfs-gui:/workspace/vcfs-gui
      - ./qemu-test-auto.sh:/workspace/qemu-test-auto.sh
      - ./qemu-test-manual.sh:/workspace/qemu-test-manual.sh
    devices:
      - /dev/kvm:/dev/kvm
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - KERNEL_VERSION=6.8.5-301.fc40.x86_64